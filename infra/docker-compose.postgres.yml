services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: managed_agents
      POSTGRES_PASSWORD: managed_agents
      POSTGRES_DB: managed_agents
    ports:
      - "5432:5432"
    volumes:
      - managed_agents_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U managed_agents -d managed_agents"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  managed_agents_postgres:
